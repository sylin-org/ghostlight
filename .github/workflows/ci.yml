name: CI

on:
  push:
    branches: ["**"]
  pull_request:

env:
  CARGO_TERM_COLOR: always

# Least privilege: CI only reads the repo. No job creates releases, comments, or checks,
# so the GITHUB_TOKEN never needs write scope.
permissions:
  contents: read

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  # FAST TIER (ADR-0051 Phase 4): the default `cargo test` set -- pure, in-process
  # (support::inproc::Harness drives the real serve_session over a duplex), and quick CLI-command
  # tests. The ~27 tests that spawn a real service/adapter are marked `#[ignore = "e2e: ..."]` and
  # run in the separate `e2e` job below, so this job gives quick, spawn-free feedback on every push.
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings
      # Build the deliverable binaries FIRST. Some tests still spawn the sibling `ghostlight`
      # /`ghostlight-relay` by path (the CLI-command tests here, and every test in the e2e job);
      # `cargo test` alone builds test harnesses + CARGO_BIN_EXE_ghostlight but NOT the sibling
      # relay deliverable, so those would panic at spawn (ENOENT). rust-cache had masked this until
      # a Cargo.lock change rotated the cache.
      - run: cargo build --locked --workspace
      # Default filter SKIPS the `#[ignore]`d spawn tests -- those run in the e2e job.
      # --no-fail-fast: report EVERY failing test binary, not just the first (ADR-0032).
      - run: cargo test --locked --no-fail-fast --workspace

  # E2E TIER (ADR-0051 Phase 4): the ~27 `#[ignore = "e2e: ..."]` tests that spawn a real
  # `ghostlight` service + thin adapter (or the CLI) end to end. Separated from the fast `test` job
  # so their spawn/stdio/exe-lock slowness never delays every-push feedback, but STILL REQUIRED --
  # this job must pass. `-- --ignored` runs ONLY the ignored set.
  e2e:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}-e2e
      - run: cargo build --locked --workspace
      - run: cargo test --locked --no-fail-fast --workspace -- --ignored

  # ADR-0056: the lightbox scenario runner is the executable governance spec (managed-policy
  # activation, last-known-good continuity, fail-closed cold boot, anti-rollback). Blocking:
  # a regression in governance behavior fails this job. One OS suffices -- the scenarios are
  # platform-independent library logic over a temp root and a localhost bundle server.
  lightbox:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: lightbox
      - run: cargo run --locked -p ghostlight-lightbox -- run --all

  extension-unit:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - run: node --test tests/extension/constants.test.js tests/extension/geometry.test.js tests/extension/grouping.test.js tests/extension/keys.test.js tests/extension/settle.test.js tests/extension/observation.test.js tests/extension/treediff.test.js tests/extension/fileset.test.js

  e2e-smoke:
    runs-on: ubuntu-latest
    # Maiden-run failure under diagnosis (docs/tasks/maturity-1/LEDGER.md post-run note).
    # Non-blocking until the live failure is diagnosed with log access; remove this line
    # once the job is green.
    continue-on-error: true
    # The quarantined job HANGS (observed: killed at the 6-hour runner ceiling on every dev
    # push, 2026-07-06). Cap it so a hang costs minutes, not six billable hours.
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - run: cargo build --locked --workspace
      - run: npm ci --prefix tests/e2e || npm install --prefix tests/e2e
      - run: npx --prefix tests/e2e playwright install --with-deps chromium
      - run: node tests/e2e/run-smoke.mjs

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Audit dependencies
        run: cargo audit
