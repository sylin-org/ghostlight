name: CI

on:
  push:
    branches: ["**"]
  pull_request:

env:
  CARGO_TERM_COLOR: always

# Least privilege: CI only reads the repo. No job creates releases, comments, or checks,
# so the GITHUB_TOKEN never needs write scope.
permissions:
  contents: read

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings
      # Build the deliverable binaries FIRST. The integration tests spawn the sibling
      # `ghostlight-adapter-agent` (and the service) by path; `cargo test` alone builds test
      # harnesses + CARGO_BIN_EXE_ghostlight but NOT the sibling adapter deliverables, so the
      # spawn-based tests would panic at spawn (ENOENT). rust-cache had masked this until a
      # Cargo.lock change rotated the cache. (The e2e-smoke job already does this.)
      - run: cargo build --locked --workspace
      # --no-fail-fast: report EVERY failing test binary, not just the first (ADR-0032 Context:
      # cargo's default fail-fast masked the true cross-platform scope behind the first failure).
      - run: cargo test --locked --no-fail-fast --workspace

  extension-unit:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - run: node --test tests/extension/constants.test.js tests/extension/geometry.test.js tests/extension/grouping.test.js tests/extension/keys.test.js tests/extension/settle.test.js tests/extension/observation.test.js tests/extension/treediff.test.js

  e2e-smoke:
    runs-on: ubuntu-latest
    # Maiden-run failure under diagnosis (docs/tasks/maturity-1/LEDGER.md post-run note).
    # Non-blocking until the live failure is diagnosed with log access; remove this line
    # once the job is green.
    continue-on-error: true
    # The quarantined job HANGS (observed: killed at the 6-hour runner ceiling on every dev
    # push, 2026-07-06). Cap it so a hang costs minutes, not six billable hours.
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - run: cargo build --locked --workspace
      - run: npm ci --prefix tests/e2e || npm install --prefix tests/e2e
      - run: npx --prefix tests/e2e playwright install --with-deps chromium
      - run: node tests/e2e/run-smoke.mjs

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Audit dependencies
        run: cargo audit
