name: CI

on:
  pull_request:
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

# Least privilege: CI only reads the repo. No job creates releases, comments, or checks,
# so the GITHUB_TOKEN never needs write scope.
permissions:
  contents: read

jobs:
  public-surfaces:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Check public release and platform claims
        shell: pwsh
        run: ./scripts/check-public-surfaces.ps1

  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # Pinned to master's HEAD SHA (not @stable) with an explicit toolchain input: @stable
      # installs whatever "stable" resolves to at runtime and does NOT read
      # rust-toolchain.toml (verified empirically -- SAPS ARCH-LOW-04), so relying on the file
      # alone silently drifts off the pin. The SHA is immutable (supply-chain hygiene); bump it
      # deliberately alongside rust-toolchain.toml, not implicitly.
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: "1.95.0"
          components: rustfmt
      - run: cargo fmt --check

  # FAST TIER (ADR-0051/0056): pure and in-process tests plus quick CLI-command tests. The
  # process-boundary suite lives in the separate Lightbox job.
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: "1.95.0"
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings
      # Build the deliverable binaries FIRST. Some CLI-command tests still spawn the sibling
      # `ghostlight` / `ghostlight-relay` by path;
      # `cargo test` alone builds test harnesses + CARGO_BIN_EXE_ghostlight but NOT the sibling
      # relay deliverable, so those would panic at spawn (ENOENT). rust-cache had masked this until
      # a Cargo.lock change rotated the cache.
      - run: cargo build --locked --workspace
      # --no-fail-fast: report EVERY failing test binary, not just the first (ADR-0032).
      - run: cargo test --locked --no-fail-fast --workspace

  # ADR-0056: the Lightbox scenario runner is the executable governance and process-boundary spec.
  # The 27 legacy spawn tests migrated here against a parity ledger. One OS suffices for CI; the
  # completion gate also runs the replacement job locally on Windows.
  lightbox:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: "1.95.0"
      - uses: Swatinem/rust-cache@v2
        with:
          key: lightbox
      - run: cargo build --locked --workspace
      - run: cargo run --locked -p ghostlight-lightbox -- run --all --reuse-cache

  extension-unit:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      # Let Node expand the quoted glob so Bash and PowerShell discover the same complete suite.
      - run: node --test "tests/extension/*.test.js"
      - run: npm test --prefix packaging/npm

  # Real extension + real binary over native messaging, driven as an MCP server over stdio.
  # Retained under ADR-0056 Decision 4: Lightbox replaces service-side process coverage, while
  # this gate proves the actual extension + Chromium boundary.
  # (ADR-0026 Decision 6). Retired 2026-07 (it hung to the 6-hour runner ceiling under
  # `continue-on-error`, verifying nothing while costing runner minutes) then re-wired here:
  # the hang's root causes -- a stale `ghostlight-adapter-*` binary name left over from the
  # ADR-0051 relay merge, and a test asserting against the wrong tool -- are fixed, and the
  # harness ran green in ~1 minute across three separate PRs (no continue-on-error, no hang)
  # before this job definition existed to prove it in CI directly. `timeout-minutes` stays as
  # a safety net, not a crutch: this is now a real, blocking gate.
  e2e-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: "1.95.0"
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - run: cargo build --locked --workspace
      - run: npm ci --prefix tests/e2e || npm install --prefix tests/e2e
      - run: npx --prefix tests/e2e playwright install --with-deps chromium
      - run: node --test tests/e2e/free-surface-baseline.test.mjs
      - run: node tests/e2e/run-smoke.mjs
      # Research 18: execute the current two-observation and numeric-tab-id baseline against the
      # same real Linux service, relay, extension, and Chromium boundary. This measures mechanics;
      # it does not enable either candidate or claim model-behavior benefit.
      - run: node tests/e2e/run-smoke.mjs --free-surface-baseline

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: "1.95.0"
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Audit dependencies
        run: cargo audit

  # Supply-chain gate (ADR-0020 spirit; SEC-LOW-07 / ARCH-LOW-01): licenses, duplicate/wildcard
  # bans, and dependency sources. Advisories stay with the `audit` job above so vulnerability
  # scanning is not double-gated. Config: deny.toml at the repo root.
  deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: "1.95.0"
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked
      - name: Check licenses, bans, and sources
        run: cargo deny check licenses bans sources
