name: Release

on:
  push:
    tags: ["v*"]
  # Build-only dry run: validates the full cross-build + packaging matrix WITHOUT
  # creating a GitHub Release. The `release` job is gated on a tag push, so a manual
  # dispatch runs prepare + test + build + read-only release assembly.
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: ghostlight

# Least privilege by default; the release job widens its own scope.
permissions:
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v7
      - name: Extract version
        id: meta
        shell: bash
        run: |
          VERSION=$(grep -m1 '^version' Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: "1.95.0"
      - uses: Swatinem/rust-cache@v2
      # Build the deliverable binaries first so the spawn-based integration tests find the sibling
      # adapter executables (see ci.yml's test job for the full rationale).
      - run: cargo build --locked --workspace
      # --no-fail-fast: report EVERY failing test binary, not just the first (ADR-0032).
      - run: cargo test --locked --no-fail-fast --workspace

  build:
    needs: [prepare]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: "1.95.0"
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - run: cargo build --release --locked --workspace --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ needs.prepare.outputs.tag }}"
          TARGET="${{ matrix.target }}"
          ARCHIVE_DIR="${BIN_NAME}-${TAG}-${TARGET}"
          mkdir "$ARCHIVE_DIR"

          BIN_SUFFIX=""
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            BIN_SUFFIX=".exe"
          fi

          # ADR-0046 + ADR-0051 Phase 3: two executables ship together -- the ghostlight brain and
          # the single ghostlight-relay pass-through (it carries both former adapter roles).
          BINS=(ghostlight ghostlight-relay)
          for b in "${BINS[@]}"; do
            cp "target/${TARGET}/release/${b}${BIN_SUFFIX}" "$ARCHIVE_DIR/"
          done
          cp README.md "$ARCHIVE_DIR/" 2>/dev/null || true
          cp LICENSE* "$ARCHIVE_DIR/" 2>/dev/null || true

          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            7z a "${ARCHIVE_DIR}.zip" "$ARCHIVE_DIR" >/dev/null
            echo "ASSET=${ARCHIVE_DIR}.zip" >> "$GITHUB_ENV"
          else
            tar czf "${ARCHIVE_DIR}.tar.gz" "$ARCHIVE_DIR"
            echo "ASSET=${ARCHIVE_DIR}.tar.gz" >> "$GITHUB_ENV"
          fi

          # The raw per-target binaries, named WITHOUT the version. The npm wrapper and the
          # get.sh/get.ps1 one-liners fetch these directly (the versioned tag lives in the
          # download URL path, and `releases/latest/download/<raw>` needs no API parsing).
          for b in "${BINS[@]}"; do
            cp "target/${TARGET}/release/${b}${BIN_SUFFIX}" "${b}-${TARGET}${BIN_SUFFIX}"
          done

      - name: Checksum
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            SHA="sha256sum"
            BIN_SUFFIX=".exe"
          else
            SHA="shasum -a 256"
            BIN_SUFFIX=""
          fi
          $SHA "${{ env.ASSET }}" > "${{ env.ASSET }}.sha256"
          for b in ghostlight ghostlight-relay; do
            RAW="${b}-${{ matrix.target }}${BIN_SUFFIX}"
            $SHA "$RAW" > "${RAW}.sha256"
          done
          cat ./*.sha256

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.target }}
          path: |
            ${{ env.ASSET }}
            ${{ env.ASSET }}.sha256
            ghostlight-${{ matrix.target }}*
            ghostlight-relay-${{ matrix.target }}*
          if-no-files-found: error

  assemble:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: release-*
          merge-multiple: true

      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: "1.95.0"

      - name: Generate CycloneDX SBOM
        shell: bash
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail
          cargo install cargo-cyclonedx --version 0.5.9 --locked
          cargo cyclonedx --format json --override-filename "ghostlight-v${VERSION}-sbom.cyclonedx"
          SBOM=$(find . -maxdepth 1 -name "ghostlight-v${VERSION}-sbom.cyclonedx*" -print -quit)
          test -n "$SBOM"
          cp "$SBOM" artifacts/

      - name: Package extension
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.prepare.outputs.version }}"
          TAG="${{ needs.prepare.outputs.tag }}"
          pwsh -File scripts/package-extension.ps1 -Version "$VERSION"
          EXTENSION="artifacts/${BIN_NAME}-extension-${TAG}.zip"
          cp "dist/${BIN_NAME}-extension-v${VERSION}.zip" "$EXTENSION"
          sha256sum "$EXTENSION" > "${EXTENSION}.sha256"

      - name: Assemble immutable release bundle
        shell: bash
        env:
          VERSION: ${{ needs.prepare.outputs.tag }}
        run: |
          set -euo pipefail
          mkdir -p bundle/assets
          cp -a artifacts/. bundle/assets/

          # One canonical, sorted manifest covers every release asset. Individual target
          # checksums remain assets for existing installers and package-manager tooling.
          (
            cd bundle/assets
            find . -maxdepth 1 -type f -printf '%f\n' \
              | LC_ALL=C sort \
              | xargs sha256sum
          ) > bundle/SHA256SUMS

          TEMPLATE=$(cat .github/release-template.md)
          NOTES="${TEMPLATE//\$\{VERSION\}/$VERSION}"
          CHECKSUMS=$(cat bundle/SHA256SUMS)
          NOTES="${NOTES//\$\{CHECKSUMS\}/$CHECKSUMS}"
          printf '%s\n' "$NOTES" > bundle/release-notes.md

          test -s bundle/SHA256SUMS
          test -s bundle/release-notes.md
          (cd bundle/assets && sha256sum -c ../SHA256SUMS)

      - name: Upload release bundle
        uses: actions/upload-artifact@v7
        with:
          name: release-bundle
          path: bundle
          if-no-files-found: error
          retention-days: 7

  release:
    needs: [prepare, test, assemble]
    # Only create a GitHub Release on a real tag push. Manual runs still validate assembly.
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the release + upload assets
      id-token: write # keyless (Sigstore) signing for build provenance
      attestations: write # write the attestations
    steps:
      - name: Download immutable release bundle
        uses: actions/download-artifact@v8
        with:
          name: release-bundle
          path: bundle

      - name: Verify release bundle
        shell: bash
        run: |
          set -euo pipefail
          test -s bundle/SHA256SUMS
          test -s bundle/release-notes.md

          awk '{print $2}' bundle/SHA256SUMS | LC_ALL=C sort > /tmp/manifest-files
          find bundle/assets -maxdepth 1 -type f -printf '%f\n' \
            | LC_ALL=C sort > /tmp/actual-files
          diff -u /tmp/manifest-files /tmp/actual-files
          (cd bundle/assets && sha256sum -c ../SHA256SUMS)

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            bundle/assets/*
            bundle/SHA256SUMS

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ needs.prepare.outputs.tag }}"
          gh release create "$TAG" \
            --repo "${{ github.repository }}" \
            --title "$TAG" \
            --notes-file bundle/release-notes.md \
            bundle/SHA256SUMS \
            bundle/assets/*
