<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title description">
  <title id="title">Ghostlight</title>
  <desc id="description">Your real browser, for any MCP agent. Visible, local, and yours.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#090b10"/>
      <stop offset="0.55" stop-color="#10131a"/>
      <stop offset="1" stop-color="#080a0e"/>
    </linearGradient>
    <linearGradient id="headline" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f5f7fa"/>
      <stop offset="0.55" stop-color="#b8f4ef"/>
      <stop offset="1" stop-color="#b8c6ff"/>
    </linearGradient>
    <radialGradient id="halo">
      <stop offset="0" stop-color="#67e8f9" stop-opacity="0.28"/>
      <stop offset="0.55" stop-color="#60a5fa" stop-opacity="0.11"/>
      <stop offset="1" stop-color="#60a5fa" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.025"/>
    </pattern>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#000000" flood-opacity="0.7"/>
    </filter>
  </defs>

  <rect width="1280" height="640" fill="url(#background)"/>
  <rect width="1280" height="640" fill="url(#grid)"/>
  <circle cx="1040" cy="300" r="370" fill="url(#halo)"/>
  <ellipse cx="1010" cy="520" rx="250" ry="55" fill="#38bdf8" opacity="0.08" filter="url(#glow)"/>

  <g transform="translate(78 76)">
    <rect x="0" y="0" width="46" height="46" rx="12" fill="#111820" stroke="#5eead4" stroke-opacity="0.55"/>
    <path d="M17 21c0-8 12-8 12 0M15 22h16v14H15z" fill="none" stroke="#8be9e1" stroke-width="3" stroke-linejoin="round"/>
    <circle cx="23" cy="29" r="3" fill="#8be9e1"/>
    <text x="64" y="23" fill="#f4f4f5" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" font-size="18" font-weight="700" letter-spacing="4">GHOSTLIGHT</text>
    <text x="65" y="43" fill="#71717a" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" font-size="10" font-weight="600" letter-spacing="3">SYLIN TOOLWORKS</text>
  </g>

  <g transform="translate(78 210)">
    <text x="0" y="0" fill="#5eead4" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" font-size="16" font-weight="700" letter-spacing="3">RESPONSIBLE BROWSER AUTOMATION</text>
    <text x="0" y="84" fill="url(#headline)" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="68" font-weight="700" letter-spacing="-3">Your real browser,</text>
    <text x="0" y="158" fill="url(#headline)" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="68" font-weight="700" letter-spacing="-3">for any MCP agent.</text>
    <text x="2" y="214" fill="#a1a1aa" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="25">Visible, local, and yours.</text>
    <g transform="translate(2 270)" fill="#7dd3fc" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" font-size="13" font-weight="700" letter-spacing="2">
      <circle cx="4" cy="-4" r="4" fill="#5eead4"/>
      <text x="18" y="0">NO ACCOUNT</text>
      <circle cx="160" cy="-4" r="4" fill="#5eead4"/>
      <text x="174" y="0">NO TELEMETRY</text>
      <circle cx="338" cy="-4" r="4" fill="#5eead4"/>
      <text x="352" y="0">OPEN CORE</text>
    </g>
  </g>

  <g transform="translate(790 92)" filter="url(#softShadow)">
    <rect x="0" y="48" width="410" height="380" rx="26" fill="#0d1117" stroke="#7dd3fc" stroke-opacity="0.28"/>
    <rect x="0" y="48" width="410" height="54" rx="26" fill="#121821"/>
    <rect x="0" y="76" width="410" height="26" fill="#121821"/>
    <circle cx="28" cy="75" r="5" fill="#3f4651"/>
    <circle cx="47" cy="75" r="5" fill="#3f4651"/>
    <circle cx="66" cy="75" r="5" fill="#3f4651"/>
    <rect x="94" y="62" width="172" height="28" rx="8" fill="#172431" stroke="#38bdf8" stroke-opacity="0.35"/>
    <text x="113" y="81" fill="#7dd3fc" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" font-size="10" letter-spacing="1">GHOSTLIGHT CONTROLLED</text>
    <rect x="24" y="126" width="112" height="268" rx="14" fill="#111821"/>
    <rect x="158" y="126" width="226" height="122" rx="14" fill="#101720" stroke="#5eead4" stroke-opacity="0.18"/>
    <rect x="158" y="270" width="226" height="124" rx="14" fill="#101720"/>
    <rect x="178" y="151" width="126" height="12" rx="6" fill="#283643"/>
    <rect x="178" y="178" width="180" height="9" rx="5" fill="#202a35"/>
    <rect x="178" y="198" width="151" height="9" rx="5" fill="#202a35"/>
    <rect x="178" y="294" width="168" height="13" rx="6" fill="#263442"/>
    <rect x="178" y="326" width="186" height="42" rx="10" fill="#132b31" stroke="#5eead4" stroke-opacity="0.4"/>
    <rect x="0" y="48" width="410" height="380" rx="26" fill="none" stroke="#38bdf8" stroke-width="3" stroke-opacity="0.52"/>
  </g>

  <g transform="translate(956 180)">
    <circle cx="92" cy="92" r="124" fill="url(#halo)"/>
    <image href="../../extension/icons/ghostlight-mascot.png" x="0" y="0" width="184" height="184" image-rendering="pixelated"/>
  </g>

  <rect x="0" y="632" width="1280" height="8" fill="url(#headline)" opacity="0.65"/>
</svg>
